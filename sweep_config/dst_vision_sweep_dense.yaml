program: ../bash_scripts/run_vision_st.sh
project: DST Continual Learning
name: Dense Continual Learning
method: grid

# grid ignores the metric for scheduling; it's only used for dashboard plots.
metric:
  goal: maximize
  name: test/acc

parameters:
  # Fixed.
  task:
    value: CIFAR10
  model:
    value: RESNET18
  benchmark:
    value: continual
  sparsifier:
    value: dense

  # Swept axes.
  seed:
    values: [1, 5, 8]

command:
  - bash
  - ${program}
  - ${args}
  - "--log-subdir"
  - "dense_cifar100_tinyvit_continual_sweep"